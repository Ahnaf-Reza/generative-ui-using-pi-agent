<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Chatbot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --bg-soft: rgba(255, 255, 255, 0.05);
        --panel: rgba(14, 20, 38, 0.86);
        --panel-strong: rgba(17, 26, 48, 0.96);
        --text: #e5ecff;
        --muted: #96a3c8;
        --border: rgba(154, 173, 224, 0.18);
        --accent: #7dd3fc;
        --accent-2: #a78bfa;
        --user: linear-gradient(135deg, rgba(125, 211, 252, 0.2), rgba(167, 139, 250, 0.25));
        --assistant: rgba(255, 255, 255, 0.05);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, rgba(125, 211, 252, 0.14), transparent 24%),
          radial-gradient(circle at 90% 0%, rgba(167, 139, 250, 0.16), transparent 28%),
          linear-gradient(180deg, #0a1020 0%, #09111d 100%);
      }

      .app {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        padding: 8px 4px;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
        font-size: 12px;
        margin: 0 0 8px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 0.96;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 760px;
      }

      .status-pill {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
        min-height: 0;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 16px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 13px;
        color: var(--muted);
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(154, 173, 224, 0.2);
        background: var(--panel-strong);
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
        outline: none;
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: rgba(125, 211, 252, 0.55);
        box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.12);
      }

      .field textarea {
        min-height: 88px;
        resize: vertical;
      }

      .help {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .meta-list {
        display: grid;
        gap: 8px;
        overflow: auto;
        padding-right: 4px;
      }

      .meta-item {
        border: 1px solid rgba(154, 173, 224, 0.16);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .meta-item button {
        width: 100%;
        text-align: left;
        border: none;
        background: transparent;
        color: inherit;
        padding: 0;
        cursor: pointer;
      }

      .meta-item strong { display: block; margin-bottom: 6px; }
      .meta-item span { color: var(--muted); font-size: 13px; }

      .chat {
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: 0;
        overflow: hidden;
      }

      .messages {
        padding: 18px;
        overflow: auto;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .bubble {
        max-width: min(84ch, 90%);
        border-radius: 20px;
        padding: 14px 16px;
        border: 1px solid rgba(154, 173, 224, 0.16);
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .bubble.user {
        margin-left: auto;
        background: var(--user);
        border-color: rgba(125, 211, 252, 0.2);
      }

      .bubble.assistant {
        background: var(--assistant);
      }

      .composer {
        padding: 18px;
        border-top: 1px solid var(--border);
        background: rgba(8, 12, 22, 0.55);
        display: grid;
        gap: 12px;
      }

      .composer .row {
        display: flex;
        gap: 12px;
        align-items: end;
      }

      .composer textarea {
        flex: 1;
        min-height: 92px;
      }

      .primary {
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #08111f;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 16px 30px rgba(125, 211, 252, 0.2);
      }

      .primary:disabled { opacity: 0.6; cursor: not-allowed; }

      .secondary {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }

      .footer-note {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
        .app { padding: 16px; }
        header { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <p class="eyebrow">Pi chatbot</p>
          <h1>Chat with Pi locally.</h1>
          <p class="subtitle">Use the chat box below to send messages to the local Pi proxy.</p>
        </div>
        <div class="status-pill" id="status">Backend configured</div>
      </header>

      <section class="grid">
        <aside class="card sidebar">
          <div style="padding:18px">
            <div class="field">
              <label>Chat setup</label>
              <div class="help">This page is ready to chat. Open the prompt box below and send a message.</div>
            </div>
          </div>
        </aside>

        <section class="card chat">
          <div class="messages" id="messages">
            <div class="bubble assistant">Type a message to start chatting.</div>
          </div>
          <form class="composer" id="chatForm">
            <textarea id="message" placeholder="Ask Pi anything…"></textarea>
            <div class="row">
              <button class="secondary" type="button" id="clear">Clear chat</button>
              <button class="primary" type="submit" id="send">Send</button>
            </div>
            <div class="footer-note">Tip: Shift+Enter makes a new line. Enter submits.</div>
          </form>
        </section>
      </section>
    </main>

    <script>
    const statusEl = document.getElementById("status");
      const messagesEl = document.getElementById("messages");
      const chatForm = document.getElementById("chatForm");
      const messageInput = document.getElementById("message");
      const clearButton = document.getElementById("clear");
      const sendButton = document.getElementById("send");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function addBubble(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      async function sendMessage(message) {
        addBubble("user", message);
        const assistantBubble = addBubble("assistant", "Thinking…");
        sendButton.disabled = true;
        setStatus("Chatting…");

        try {
          const response = await fetch("/api/pi-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || `Request failed (${response.status})`);
          }

          assistantBubble.textContent = data.reply || "(No reply returned)";
          setStatus("Ready");
        } catch (error) {
          assistantBubble.textContent = `Error: ${error.message}`;
          setStatus("Error");
        } finally {
          sendButton.disabled = false;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;
        messageInput.value = "";
        await sendMessage(message);
      });

      clearButton.addEventListener("click", () => {
        messagesEl.innerHTML = '<div class="bubble assistant">Type a message to start chatting.</div>';
        setStatus("Ready");
      });

      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          chatForm.requestSubmit();
        }
      });

      setStatus("Ready");
    </script>
  </body>
</html>
